services:
  postgres:
    image: postgres:16-alpine
    container_name: aegis-postgres
    environment:
      POSTGRES_DB: aegis
      POSTGRES_USER: aegis
      POSTGRES_PASSWORD: aegis
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:8-alpine
    container_name: aegis-redis
    ports:
      - "6379:6379"

  nats:
    image: nats:2.11-alpine
    container_name: aegis-nats
    command: ["-js"]
    ports:
      - "4222:4222"
      - "8222:8222"

  temporal-postgres:
    image: postgres:16-alpine
    container_name: aegis-temporal-postgres
    environment:
      POSTGRES_DB: temporal
      POSTGRES_USER: temporal
      POSTGRES_PASSWORD: temporal
    volumes:
      - temporal_postgres_data:/var/lib/postgresql/data

  temporal:
    image: temporalio/auto-setup:latest
    container_name: aegis-temporal
    environment:
      DB: postgres12
      DB_PORT: 5432
      POSTGRES_USER: temporal
      POSTGRES_PWD: temporal
      POSTGRES_SEEDS: temporal-postgres
      DYNAMIC_CONFIG_FILE_PATH: config/dynamicconfig/docker.yaml
    ports:
      - "7233:7233"
    depends_on:
      - temporal-postgres

  server:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile
    container_name: aegis-server
    env_file:
      - ../../.env.example
    command: ["/usr/local/bin/aegis-server"]
    depends_on:
      - postgres
      - redis
      - nats
      - temporal
    ports:
      - "8088:8088"

volumes:
  postgres_data:
  temporal_postgres_data:
